<style>

:root{
--gold:#d4af37;
--bg:#000;
--text:#fff;
--section-bg:#111;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:'Vazirmatn',sans-serif;
direction:rtl;
overflow-x:hidden;
cursor:none;
transition:background .4s,color .4s;
}

/* loader */

.loader{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.loader span{
font-size:40px;
color:var(--gold);
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:.3}
50%{opacity:1}
100%{opacity:.3}
}

/* cursor */

.cursor{
width:20px;
height:20px;
border:2px solid var(--gold);
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
}

/* theme button */

.theme-btn{
position:fixed;
top:20px;
left:20px;
background:var(--gold);
border:none;
padding:10px 20px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
z-index:9999;
}

/* hero */

.hero{
height:100vh;
position:relative;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.hero video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
z-index:1;
}

#particles{
position:absolute;
inset:0;
z-index:2;
}

.hero h1{
position:relative;
z-index:3;
font-family:'Playfair Display',serif;
font-size:70px;
color:var(--gold);
letter-spacing:5px;
}

/* section */

.section{
padding:120px 10%;
text-align:center;
background:var(--section-bg);
transition:background .4s;
}

.section h2{
font-size:40px;
color:var(--gold);
margin-bottom:60px;
}

/* slider */

.slider{
display:flex;
gap:40px;
justify-content:center;
flex-wrap:wrap;
perspective:1000px;
}

.slide{
width:250px;
transition:.5s;
transform-style:preserve-3d;
}

.slide img{
width:100%;
border-radius:20px;
}

.slide:hover{
transform:rotateY(15deg) scale(1.1);
}

/* button */

.btn{
padding:15px 40px;
border-radius:50px;
background:var(--gold);
color:black;
text-decoration:none;
font-weight:bold;
}

/* whatsapp */

.whatsapp{
position:fixed;
bottom:30px;
left:30px;
background:#259fd3;
width:60px;
height:60px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:25px;
text-decoration:none;
color:white;
}

footer{
padding:40px;
text-align:center;
background:#111;
color:#777;
transition:background .4s;
}

.telegram-btn{
display:block;
width:max-content;
margin-left:auto;
}
.hero-content{
    position:relative;
    z-index:3;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.hero h1{
    margin:0;
    font-family:'Playfair Display',serif;
    font-size:70px;
    color:var(--gold);
    letter-spacing:5px;
    text-shadow:0 0 20px rgba(212,175,55,.5);

.hero-subtitle{

#gold-price-box{

z-index:9999;
background:rgba(0,0,0,.85);
color:#d4af37;
padding:12px 18px;

border:1px solid #d4af37;

box-shadow:0 0 20px rgba(212,175,55,.3);
backdrop-filter:blur(10px);
}
</style>

<script>

/* loader */

window.addEventListener("load",()=>{
document.querySelector(".loader").style.display="none"
})

/* cursor */

const cursor=document.querySelector(".cursor")
document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/* video playlist */

const video=document.getElementById("heroVideo")

const videos=[
"first2.mp4",
"gardan.mp4",

]

let index=0

function playVideo(i){
video.src=videos[i]
video.load()
video.play().catch(()=>{})
}

playVideo(index)

video.addEventListener("ended",()=>{
index++
if(index>=videos.length){
index=0
}
playVideo(index)
})


/* theme toggle */

const themeBtn=document.getElementById("themeToggle")
let darkMode=true

themeBtn.addEventListener("click",()=>{

darkMode=!darkMode

if(darkMode){

document.documentElement.style.setProperty("--bg","#000")
document.documentElement.style.setProperty("--text","#fff")
document.documentElement.style.setProperty("--section-bg","#111")
themeBtn.innerText="Dark Theme"

}else{

document.documentElement.style.setProperty("--bg","#f4f4f4")
document.documentElement.style.setProperty("--text","#111")
document.documentElement.style.setProperty("--section-bg","#ffffff")
themeBtn.innerText="Light Theme"

}

})
